<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>DisisRadio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#003366" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #000000;
        color: #fff;
        text-align: center;
      }
      h1 {
        margin-top: 40px;
      }
      .player {
        margin: 40px auto;
        max-width: 300px;
      }
      button {
        margin: 10px;
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 30px;
        background: #003366;
        color: #fff;
        cursor: pointer;
      }
      button:disabled {
        background: #444;
        cursor: not-allowed;
      }
      .status {
        margin-top: 20px;
        font-size: 14px;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <h1>DisisRadio</h1>

    <div class="player">
      <audio id="radio" preload="auto"></audio>
      <button id="playBtn">▶️ Ascolta DisisRadio</button>
      <div class="status" id="status"></div>
    </div>

    <script src="player.js"></script>
  </body>
</html>
